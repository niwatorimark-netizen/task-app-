<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイクラ やることリスト</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="やること">
  <meta name="theme-color" content="#5D8A3C">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    :root {
      --grass: #5D8A3C;
      --dirt: #8B6340;
      --stone: #888888;
      --wood: #9E7C3E;
      --gold: #FFD700;
      --sky: #87CEEB;
      --dark: #1A1A1A;
      --white: #F0F0F0;
      --diamond: #5CE6E6;
      --redstone: #CC0000;
      --emerald: #17DD62;
      --xp: #7EC850;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Press Start 2P', monospace, sans-serif;
      background-color: var(--sky);
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 63px, rgba(255,255,255,0.05) 63px, rgba(255,255,255,0.05) 64px),
        repeating-linear-gradient(90deg, transparent, transparent 63px, rgba(255,255,255,0.05) 63px, rgba(255,255,255,0.05) 64px);
      min-height: 100vh;
      padding: 12px 12px 40px;
      color: var(--dark);
    }

    h1 {
      text-align: center;
      font-size: clamp(11px, 2.8vw, 17px);
      color: var(--white);
      text-shadow: 3px 3px 0 var(--dark);
      margin-bottom: 12px;
      padding: 10px;
      background: var(--grass);
      border: 4px solid var(--dark);
    }

    .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 14px; }

    /* ===== PLAYER STATUS ===== */
    .player-card {
      background: var(--dark);
      border: 4px solid var(--gold);
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .player-top {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .player-face {
      width: 48px; height: 48px;
      image-rendering: pixelated;
      flex-shrink: 0;
      font-size: 40px;
      line-height: 1;
    }
    .player-info { flex: 1; min-width: 120px; }
    .player-name {
      font-size: clamp(9px, 2.2vw, 13px);
      color: var(--gold);
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 4px;
    }
    .player-level {
      font-size: clamp(8px, 2vw, 11px);
      color: var(--xp);
    }

    /* XP バー */
    .xp-bar-wrap {
      background: #333;
      border: 2px solid #555;
      height: 14px;
      position: relative;
    }
    .xp-bar {
      height: 100%;
      background: var(--xp);
      transition: width 0.4s;
    }
    .xp-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 7px; color: var(--white);
    }

    /* ストリーク */
    .streak-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .streak-fire {
      font-size: clamp(20px, 5vw, 28px);
      line-height: 1;
    }
    .streak-info { flex: 1; }
    .streak-count {
      font-size: clamp(10px, 2.5vw, 15px);
      color: #FF8C00;
      text-shadow: 2px 2px 0 #000;
    }
    .streak-label { font-size: 8px; color: #aaa; margin-top: 2px; }

    /* ===== PAGE LINK BUTTONS ===== */
    .page-links {
      display: flex;
      gap: 10px;
    }
    .page-link-btn {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 12px;
      border: 4px solid var(--dark);
      text-decoration: none;
      cursor: pointer;
    }
    .chest-link  { background: #3B2306; border-color: var(--wood); }
    .badge-link  { background: #1A1A2E; border-color: #3A5FCD; }
    .page-link-icon  { font-size: 24px; }
    .page-link-label { flex: 1; font-size: clamp(9px, 2.2vw, 12px); color: var(--gold); text-shadow: 1px 1px 0 #000; }
    .page-link-arrow { font-size: 10px; color: #aaa; }

    /* ===== COLLAPSIBLE ===== */
    .collapse-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    .collapse-arrow { font-size: 10px; color: #aaa; transition: transform 0.2s; }
    .collapse-header.open .collapse-arrow { transform: rotate(90deg); }
    .collapse-body { display: none; margin-top: 10px; }
    .collapse-body.open { display: block; }

    /* ===== ITEM CHEST (ドロップアイテム) ===== */
    .chest-card {
      background: #3B2306;
      border: 4px solid var(--wood);
      padding: 12px;
    }
    .chest-title {
      font-size: clamp(8px, 2vw, 10px);
      color: var(--gold);
    }
    .items-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .item-slot {
      width: 44px; height: 44px;
      background: #555;
      border: 3px solid #888;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      font-size: 22px;
      position: relative;
      cursor: default;
    }
    .item-slot .item-count {
      position: absolute;
      bottom: 1px; right: 3px;
      font-size: 8px;
      color: var(--white);
      text-shadow: 1px 1px 0 #000;
    }
    .item-slot.empty { opacity: 0.3; }
    .chest-empty { font-size: 8px; color: #aaa; }

    /* ===== BADGES ===== */
    .badges-card {
      background: #1A1A2E;
      border: 4px solid var(--lapis, #3A5FCD);
      padding: 12px;
    }
    .badges-title {
      font-size: clamp(8px, 2vw, 10px);
      color: var(--diamond);
      margin-bottom: 10px;
    }
    .badges-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .badge {
      background: #2A2A4A;
      border: 2px solid #444;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
      opacity: 0.4;
      transition: opacity 0.3s;
      min-width: 0;
    }
    .badge.unlocked {
      opacity: 1;
      border-color: var(--gold);
      background: #2A2A1A;
    }
    .badge-icon { font-size: 18px; }
    .badge-info { }
    .badge-name  { font-size: 7px; color: var(--gold); }
    .badge-desc  { font-size: 6px; color: #aaa; margin-top: 2px; }

    /* ===== COUNTDOWN ===== */
    .countdown-card {
      background: var(--dirt);
      border: 4px solid var(--dark);
      padding: 14px;
      position: relative;
    }
    .countdown-card::before {
      content: ''; position: absolute; inset: 3px;
      border: 2px solid rgba(255,255,255,0.15); pointer-events: none;
    }
    .countdown-title {
      font-size: clamp(8px, 2vw, 11px);
      color: var(--gold); text-shadow: 2px 2px 0 var(--dark);
      margin-bottom: 12px;
    }
    .event-input-row {
      display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .event-input-row input[type="text"] {
      flex: 1; min-width: 100px;
      font-family: inherit; font-size: 9px; padding: 8px;
      border: 3px solid var(--dark); background: #3A2B1A;
      color: var(--white); outline: none;
    }
    .event-input-row input[type="date"] {
      font-family: inherit; font-size: 9px; padding: 8px;
      border: 3px solid var(--dark); background: #3A2B1A;
      color: var(--white); outline: none; width: 100%;
    }
    .btn-add-event {
      font-family: inherit; font-size: 9px; padding: 8px 12px;
      background: var(--grass); color: var(--white);
      border: 3px solid var(--dark); cursor: pointer;
      text-shadow: 1px 1px 0 var(--dark); white-space: nowrap;
    }
    .btn-add-event:active { transform: translateY(2px); }
    .events-list { display: flex; flex-direction: column; gap: 8px; }
    .event-item {
      background: #2D1F0E; border: 3px solid var(--dark);
      padding: 10px; display: flex; justify-content: space-between;
      align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .event-name { font-size: 8px; color: var(--gold); text-shadow: 1px 1px 0 var(--dark); flex: 1; min-width: 80px; }
    .event-days { font-size: clamp(12px, 3.5vw, 20px); color: var(--diamond); text-shadow: 2px 2px 0 var(--dark); white-space: nowrap; }
    .btn-delete-event {
      font-family: inherit; font-size: 8px; padding: 4px 8px;
      background: var(--redstone); color: var(--white);
      border: 2px solid var(--dark); cursor: pointer;
    }
    .event-days.today { color: var(--gold); animation: blink 1s step-end infinite; }
    .event-days.past  { color: #888; }
    @keyframes blink { 50% { opacity: 0.4; } }

    /* ===== TASKS ===== */
    .tasks-card {
      background: var(--stone);
      border: 4px solid var(--dark);
      padding: 14px;
    }
    .task-list {
      min-height: 40px;
    }
    .add-task-card {
      background: var(--stone);
      border: 4px solid var(--dark);
      padding: 12px;
    }
    .tasks-card::before {
      content: ''; position: absolute; inset: 3px;
      border: 2px solid rgba(255,255,255,0.15); pointer-events: none;
    }
    .tasks-title {
      font-size: clamp(8px, 2vw, 11px); color: var(--white);
      text-shadow: 2px 2px 0 var(--dark); margin-bottom: 12px;
    }
    .add-task-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .add-task-row input {
      flex: 1; font-family: inherit; font-size: 9px; padding: 8px;
      border: 3px solid var(--dark); background: #555;
      color: var(--white); outline: none;
    }
    .btn-add-task {
      font-family: inherit; font-size: 9px; padding: 8px 12px;
      background: var(--grass); color: var(--white);
      border: 3px solid var(--dark); cursor: pointer;
      text-shadow: 1px 1px 0 var(--dark);
    }
    .btn-add-task:active { transform: translateY(2px); }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item {
      background: #444; border: 3px solid var(--dark);
      padding: 10px 12px; display: flex; align-items: center;
      gap: 10px; cursor: pointer; position: relative;
    }
    .task-item:active { transform: translateY(1px); }
    .task-item.done { background: #2A3D2A; }
    .task-checkbox {
      width: 24px; height: 24px; border: 3px solid var(--dark);
      background: #333; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 14px;
    }
    .task-item.done .task-checkbox { background: var(--grass); }
    .task-text {
      flex: 1; font-size: clamp(7px, 1.8vw, 10px);
      color: var(--white); text-shadow: 1px 1px 0 var(--dark); word-break: break-all;
    }
    .task-item.done .task-text { text-decoration: line-through; color: #aaa; }
    .btn-delete-task {
      font-size: 14px; background: none; border: none;
      cursor: pointer; color: #aaa; padding: 0 4px; line-height: 1;
    }
    .progress-bar-wrap {
      margin-top: 10px; background: #333;
      border: 3px solid var(--dark); height: 20px; position: relative;
    }
    .progress-bar { height: 100%; background: var(--diamond); transition: width 0.3s; }
    .progress-text {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; color: var(--dark); text-shadow: none;
    }
    .empty-msg { font-size: 8px; color: #bbb; text-align: center; padding: 12px 0; }

    /* ===== POPUP ===== */
    .popup-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center; justify-content: center;
    }
    .popup-overlay.show { display: flex; }
    .popup {
      background: var(--dark);
      border: 4px solid var(--gold);
      padding: 24px 20px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      animation: popIn 0.2s ease;
    }
    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .popup-icon  { font-size: 48px; margin-bottom: 10px; }
    .popup-title { font-size: clamp(11px, 3vw, 15px); color: var(--gold); text-shadow: 2px 2px 0 #000; margin-bottom: 8px; }
    .popup-body  { font-size: clamp(9px, 2.2vw, 12px); color: var(--white); line-height: 1.7; margin-bottom: 16px; }
    .popup-close {
      font-family: inherit; font-size: 11px; font-weight: bold;
      padding: 10px 24px; background: var(--grass);
      color: var(--white); border: 3px solid var(--dark); cursor: pointer;
    }

    footer { text-align: center; font-size: 7px; color: rgba(255,255,255,0.5); }

    /* ===== タスク完了アニメーション ===== */
    @keyframes taskDone {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.06); background: #3A5A3A; }
      100% { transform: scale(1); }
    }
    .task-item.just-done { animation: taskDone 0.35s ease; }

    /* パーティクル */
    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 16px;
      z-index: 9999;
      animation: fly 0.7s ease-out forwards;
    }
    @keyframes fly {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }

    /* XPフロートテキスト */
    .xp-float {
      position: fixed;
      pointer-events: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 13px;
      color: #7EC850;
      text-shadow: 2px 2px 0 #000;
      z-index: 9999;
      animation: floatUp 1s ease-out forwards;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0);   opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>⛏ やることリスト ⛏</h1>

  <!-- タスクリスト -->
  <div class="tasks-card">
    <div class="tasks-title">📋 やること</div>
    <div class="task-list" id="taskList"></div>
    <div class="progress-bar-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
      <div class="progress-text" id="progressText"></div>
    </div>
    <div class="add-task-row" style="margin-top:10px">
      <input type="text" id="taskInput" placeholder="やること を入力..." maxlength="40"
             onkeydown="if(event.key==='Enter') addTask()">
      <button class="btn-add-task" onclick="addTask()">追加</button>
    </div>
  </div>

  <!-- プレイヤーステータス -->
  <div class="player-card">
    <div class="player-top">
      <div class="player-face">🧑‍🦱</div>
      <div class="player-info">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <div class="player-name" id="playerName">Steve</div>
          <button onclick="openNameEdit()" style="font-family:inherit;font-size:8px;padding:2px 6px;background:#444;color:#aaa;border:2px solid #666;cursor:pointer">✏️</button>
        </div>
        <div class="player-level" id="playerLevel">Lv.1 木こり</div>
      </div>
      <div class="streak-row">
        <div class="streak-fire">🔥</div>
        <div class="streak-info">
          <div class="streak-count" id="streakCount">0日</div>
          <div class="streak-label">れんぞく</div>
        </div>
      </div>
    </div>
    <div class="xp-bar-wrap">
      <div class="xp-bar" id="xpBar" style="width:0%"></div>
      <div class="xp-text" id="xpText">XP 0 / 100</div>
    </div>
  </div>

  <!-- ページリンクボタン -->
  <div class="page-links">
    <a class="page-link-btn chest-link" href="chest.html">
      <span class="page-link-icon">🪣</span>
      <span class="page-link-label">チェスト</span>
      <span class="page-link-arrow">▶</span>
    </a>
    <a class="page-link-btn badge-link" href="badges.html">
      <span class="page-link-icon">🏆</span>
      <span class="page-link-label">じっせき</span>
      <span class="page-link-arrow">▶</span>
    </a>
  </div>

  <!-- カウントダウン -->
  <div class="countdown-card">
    <div class="countdown-title">🗓 カウントダウン</div>
    <div class="event-input-row">
      <input type="text" id="eventName" placeholder="イベント名 (例: 夏休み)" maxlength="20">
      <input type="date" id="eventDate">
      <button class="btn-add-event" onclick="addEvent()">追加</button>
    </div>
    <div class="events-list" id="eventsList"></div>
  </div>

  <footer>マイクラ やることリスト v2.0</footer>
</div>

<!-- ポップアップ -->
<div class="popup-overlay" id="popupOverlay">
  <div class="popup">
    <div class="popup-icon" id="popupIcon"></div>
    <div class="popup-title" id="popupTitle"></div>
    <div class="popup-body" id="popupBody"></div>
    <button class="popup-close" onclick="closePopup()">OK！</button>
  </div>
</div>

<script>
// ==================== ユーティリティ ====================
function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() { return new Date().toISOString().slice(0,10); }

// ==================== データ ====================
let events  = load('mc_events', []);
let tasks   = load('mc_tasks',  []);
let player  = load('mc_player', { xp: 0, level: 1, totalDone: 0, lastLogin: '', streak: 0, items: {}, badges: [], name: 'Steve' });

// ==================== ドロップアイテム ====================
const DROPS = [
  { id:'wood',    icon:'🪵', name:'木材',       weight:40 },
  { id:'stone',   icon:'🪨', name:'石',         weight:30 },
  { id:'iron',    icon:'⚙️', name:'鉄インゴット', weight:15 },
  { id:'gold',    icon:'🥇', name:'金インゴット', weight:8  },
  { id:'diamond', icon:'💎', name:'ダイヤ',      weight:4  },
  { id:'emerald', icon:'💚', name:'エメラルド',  weight:2  },
  { id:'nether',  icon:'🔮', name:'ネザースター', weight:1  },
];
function rollDrop() {
  const total = DROPS.reduce((s,d) => s + d.weight, 0);
  let r = Math.random() * total;
  for (const d of DROPS) { r -= d.weight; if (r <= 0) return d; }
  return DROPS[0];
}

// ==================== レベル定義 ====================
// 称号マップ（節目レベルに設定、間は補完）
const TITLE_MAP = {
  1:'木こり', 5:'採掘者', 10:'冒険者', 15:'石工',
  20:'鍛冶師', 25:'弓使い', 30:'旅人', 35:'探検家',
  40:'ハンター', 45:'戦士', 50:'騎士',
  55:'魔法使い', 60:'錬金術師', 65:'ドラゴンスレイヤー',
  70:'英雄', 75:'伝説の勇者', 80:'ダイヤの騎士',
  85:'エンダー討伐士', 90:'宇宙の覇者', 95:'神話の存在',
  99:'★レジェンド★',
};
function titleForLv(lv) {
  // 同じかそれ以下で一番近い節目を返す
  let t = '木こり';
  for (const k of Object.keys(TITLE_MAP).map(Number).sort((a,b)=>a-b)) {
    if (lv >= k) t = TITLE_MAP[k];
  }
  return t;
}

// 99段階のXP閾値を生成（全体30000XP、累乗カーブ）
const LEVELS = Array.from({length: 99}, (_, i) => {
  const lv = i + 1;
  const xp = lv === 1 ? 0 : Math.floor(30000 * Math.pow((lv - 1) / 98, 1.8));
  return { lv, xp, title: titleForLv(lv) };
});

function getLevel(xp) {
  let cur = LEVELS[0];
  for (const l of LEVELS) { if (xp >= l.xp) cur = l; }
  return cur;
}
function nextLevelXP(xp) {
  for (const l of LEVELS) { if (l.xp > xp) return l.xp; }
  return null;
}

// ==================== 実績定義 ====================
const BADGE_DEFS = [
  { id:'first',    icon:'🌱', name:'はじめの一歩', desc:'はじめてタスクをクリア！',         check: p => p.totalDone >= 1   },
  { id:'done10',   icon:'⭐', name:'10回クリア',   desc:'タスクを10回クリア！',             check: p => p.totalDone >= 10  },
  { id:'done50',   icon:'🌟', name:'50回クリア',   desc:'タスクを50回クリア！',             check: p => p.totalDone >= 50  },
  { id:'streak3',  icon:'🔥', name:'3日連続',      desc:'3日連続でアプリを開いた！',        check: p => p.streak >= 3      },
  { id:'streak7',  icon:'🔥', name:'1週間連続',    desc:'7日連続でアプリを開いた！',        check: p => p.streak >= 7      },
  { id:'streak30', icon:'👑', name:'1ヶ月連続',    desc:'30日連続でアプリを開いた！',       check: p => p.streak >= 30     },
  { id:'diamond',  icon:'💎', name:'ダイヤゲット', desc:'ダイヤモンドをドロップした！',     check: p => (p.items.diamond||0) >= 1 },
  { id:'lv10',     icon:'🏅', name:'Lv.10到達',    desc:'プレイヤーレベル10に到達！',       check: p => getLevel(p.xp).lv >= 10 },
  { id:'lv50',     icon:'🏆', name:'Lv.50到達',    desc:'プレイヤーレベル50に到達！',       check: p => getLevel(p.xp).lv >= 50 },
  { id:'lv99',     icon:'👑', name:'レジェンド',   desc:'Lv.99！伝説のプレイヤー！',        check: p => getLevel(p.xp).lv >= 99 },
];

// ==================== ポップアップ ====================
let popupQueue = [];
let popupShowing = false;
function showPopup(icon, title, body) {
  popupQueue.push({ icon, title, body });
  if (!popupShowing) flushPopup();
}
function flushPopup() {
  if (popupQueue.length === 0) { popupShowing = false; return; }
  popupShowing = true;
  const { icon, title, body } = popupQueue.shift();
  document.getElementById('popupIcon').textContent  = icon;
  document.getElementById('popupTitle').textContent = title;
  document.getElementById('popupBody').innerHTML    = body;
  document.getElementById('popupOverlay').classList.add('show');
}
function closePopup() {
  document.getElementById('popupOverlay').classList.remove('show');
  setTimeout(flushPopup, 200);
}

// ==================== ログインストリーク ====================
function checkLogin() {
  const t = today();
  if (player.lastLogin === t) return; // 今日もう済んでる

  const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
  const yStr = yesterday.toISOString().slice(0,10);

  if (player.lastLogin === yStr) {
    player.streak += 1;
  } else if (player.lastLogin !== t) {
    player.streak = 1;
  }
  player.lastLogin = t;
  save('mc_player', player);

  // ストリーク通知
  if (player.streak > 1) {
    showPopup('🔥',
      `${player.streak}日れんぞく！`,
      `すごい！<br>${player.streak}日れんぞくでアプリを開いたよ！<br>このちょうしでがんばろう！`
    );
  } else {
    showPopup('☀️', 'おはよう！', '今日もやることをかたづけよう！');
  }
}

// ==================== XP & レベルアップ ====================
function addXP(amount) {
  const prevLv = getLevel(player.xp).lv;
  player.xp += amount;
  const newLvData = getLevel(player.xp);
  save('mc_player', player);
  renderPlayer();
  if (newLvData.lv > prevLv) {
    showPopup('⬆️',
      `レベルアップ！`,
      `Lv.${newLvData.lv}「${newLvData.title}」になった！<br>さらに強くなったぞ！`
    );
  }
}

// ==================== アイテムドロップ ====================
function triggerDrop() {
  const drop = rollDrop();
  player.items[drop.id] = (player.items[drop.id] || 0) + 1;
  save('mc_player', player);
  renderItems();
  showPopup(drop.icon,
    `${drop.name}をゲット！`,
    `タスククリアのごほうびに<br>「${drop.name}」がドロップした！`
  );
}

// ==================== 実績チェック ====================
function checkBadges() {
  let newBadge = false;
  for (const b of BADGE_DEFS) {
    if (!player.badges.includes(b.id) && b.check(player)) {
      player.badges.push(b.id);
      newBadge = true;
      showPopup('🏆', '実績かいじょ！', `「${b.icon} ${b.name}」<br>${b.desc}`);
    }
  }
  if (newBadge) save('mc_player', player);
  renderBadges();
}

// ==================== 描画: プレイヤー ====================
function renderPlayer() {
  const lvData = getLevel(player.xp);
  const next   = nextLevelXP(player.xp);
  const prevXP = lvData.xp;
  const pct    = next ? Math.round((player.xp - prevXP) / (next - prevXP) * 100) : 100;

  document.getElementById('playerName').textContent  = player.name || 'Steve';
  document.getElementById('playerLevel').textContent = `Lv.${lvData.lv} ${lvData.title}`;
  document.getElementById('streakCount').textContent = `${player.streak}日`;
  document.getElementById('xpBar').style.width = pct + '%';
  document.getElementById('xpText').textContent = next
    ? `XP ${player.xp - prevXP} / ${next - prevXP}`
    : `MAX LEVEL！ XP ${player.xp}`;
}

// ==================== なまえ変更 ====================
function openNameEdit() {
  const name = prompt('なまえを入力してね（10文字まで）', player.name || 'Steve');
  if (name === null) return;           // キャンセル
  const trimmed = name.trim().slice(0, 10);
  if (!trimmed) return;
  player.name = trimmed;
  save('mc_player', player);
  renderPlayer();
}

// ==================== 描画: アイテム ====================
function renderItems() {
  const grid = document.getElementById('itemsGrid');
  const entries = DROPS.filter(d => player.items[d.id] > 0);
  if (entries.length === 0) {
    grid.innerHTML = '<div class="chest-empty">タスクをクリアするとアイテムがドロップ！</div>';
    return;
  }
  grid.innerHTML = entries.map(d => `
    <div class="item-slot" title="${d.name}">
      ${d.icon}
      <span class="item-count">${player.items[d.id]}</span>
    </div>`).join('');
}

// ==================== 描画: バッジ ====================
function renderBadges() {
  document.getElementById('badgesGrid').innerHTML = BADGE_DEFS.map(b => `
    <div class="badge ${player.badges.includes(b.id) ? 'unlocked' : ''}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-info">
        <div class="badge-name">${b.name}</div>
        <div class="badge-desc">${b.desc}</div>
      </div>
    </div>`).join('');
}

// ==================== カウントダウン ====================
function daysUntil(dateStr) {
  const t = new Date(); t.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - t) / 86400000);
}
function addEvent() {
  const name = document.getElementById('eventName').value.trim();
  const date = document.getElementById('eventDate').value;
  if (!name || !date) { alert('イベント名と日付を入力してね！'); return; }
  events.push({ id: Date.now(), name, date });
  save('mc_events', events);
  document.getElementById('eventName').value = '';
  document.getElementById('eventDate').value = '';
  renderEvents();
}
function deleteEvent(id) {
  events = events.filter(e => e.id !== id);
  save('mc_events', events);
  renderEvents();
}
function renderEvents() {
  const list = document.getElementById('eventsList');
  if (!events.length) {
    list.innerHTML = '<div class="empty-msg">イベントがないよ。追加してみよう！</div>';
    return;
  }
  events.sort((a, b) => new Date(a.date) - new Date(b.date));
  list.innerHTML = events.map(e => {
    const d = daysUntil(e.date);
    let label, cls;
    if      (d > 0)  { label = `あと ${d} 日`; cls = ''; }
    else if (d === 0){ label = '今日！';         cls = 'today'; }
    else             { label = `${-d} 日前`;    cls = 'past'; }
    return `<div class="event-item">
      <div class="event-name">${esc(e.name)}</div>
      <div class="event-days ${cls}">${label}</div>
      <button class="btn-delete-event" onclick="deleteEvent(${e.id})">✕</button>
    </div>`;
  }).join('');
}

// ==================== タスクリスト ====================
function addTask() {
  const input = document.getElementById('taskInput');
  const text  = input.value.trim();
  if (!text) return;
  tasks.push({ id: Date.now(), text, done: false });
  save('mc_tasks', tasks);
  input.value = '';
  renderTasks();
}
function toggleTask(id) {
  // IDを数値に統一
  const numId = Number(id);
  const task  = tasks.find(t => Number(t.id) === numId);
  if (!task) return;

  const wasDone = task.done;
  // チェック状態を反転して即保存・即描画
  tasks = tasks.map(t => Number(t.id) === numId ? { ...t, done: !t.done } : t);
  save('mc_tasks', tasks);
  renderTasks(); // ← まず確実に描画

  // 完了になった場合のみアニメ＆報酬（エラーが起きても描画済みなので問題なし）
  if (!wasDone) {
    try {
      const el   = document.getElementById('task_' + numId);
      const rect = el ? el.getBoundingClientRect() : null;
      const cx   = rect ? rect.left + rect.width  / 2 : window.innerWidth  / 2;
      const cy   = rect ? rect.top  + rect.height / 2 : window.innerHeight / 2;
      playCheckAnim(cx, cy);
    } catch(err) { console.warn('anim error', err); }
    try {
      player.totalDone += 1;
      addXP(8);
      if (Math.random() < 0.3) triggerDrop();
      checkBadges();
    } catch(err) { console.warn('reward error', err); }
  }
}

// ==================== チェックアニメーション ====================
function playCheckAnim(cx, cy) {

  // パーティクル（マイクラっぽい絵文字）
  const PARTS = ['✨','⭐','💫','🟩','🟨','💎'];
  const count = 6;
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = PARTS[Math.floor(Math.random() * PARTS.length)];
    const angle = (360 / count) * i + Math.random() * 30;
    const dist  = 50 + Math.random() * 50;
    const rad   = angle * Math.PI / 180;
    el.style.setProperty('--dx', `${Math.cos(rad) * dist}px`);
    el.style.setProperty('--dy', `${Math.sin(rad) * dist - 20}px`);
    el.style.left = cx + 'px';
    el.style.top  = cy + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 750);
  }

  // XPフロートテキスト
  const xpEl = document.createElement('div');
  xpEl.className = 'xp-float';
  xpEl.textContent = '+8 XP';
  xpEl.style.left = (cx - 20) + 'px';
  xpEl.style.top  = (cy - 10) + 'px';
  document.body.appendChild(xpEl);
  setTimeout(() => xpEl.remove(), 1050);
}
function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  save('mc_tasks', tasks);
  renderTasks();
}
function renderTasks() {
  const list = document.getElementById('taskList');
  const wrap = document.getElementById('progressWrap');
  const bar  = document.getElementById('progressBar');
  const text = document.getElementById('progressText');

  if (!tasks.length) {
    list.innerHTML = `
      <div class="empty-msg" style="border:2px dashed #666;padding:16px;text-align:center;color:#bbb;font-size:9px;line-height:2">
        ↓ 下の入力欄からやることを追加しよう！
      </div>`;
    wrap.style.display = 'none';
    return;
  }
  list.innerHTML = tasks.map(t => `
    <div class="task-item ${t.done ? 'done' : ''}" id="task_${t.id}" onclick="toggleTask(${t.id})">
      <div class="task-checkbox">${t.done ? '✔' : ''}</div>
      <div class="task-text">${esc(t.text)}</div>
      <button class="btn-delete-task" onclick="event.stopPropagation(); deleteTask(${t.id})">🗑</button>
    </div>`).join('');

  const done = tasks.filter(t => t.done).length;
  const pct  = Math.round(done / tasks.length * 100);
  wrap.style.display = 'block';
  bar.style.width = pct + '%';
  text.textContent = `${done} / ${tasks.length} クリア！ (${pct}%)`;

  // 全タスク完了ボーナス
  if (done === tasks.length && tasks.length > 0) {
    const allKey = 'mc_allBonus_' + today();
    if (!load(allKey, false)) {
      save(allKey, true);
      addXP(15);
      showPopup('🎉', 'ぜんぶクリア！',
        '今日のタスクをぜんぶクリア！<br>ボーナスXP +30 ゲット！');
    }
  }
}

// ==================== 折りたたみ ====================
function toggleCollapse(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

// ==================== 毎日0時リセット ====================
function checkDailyReset() {
  const t = today();
  const lastReset = load('mc_last_reset', '');
  if (lastReset === t) return; // 今日もうリセット済み
  // タスクをすべて未完了に戻す
  tasks = tasks.map(t => ({ ...t, done: false }));
  save('mc_tasks', tasks);
  save('mc_last_reset', t);
}

// 次の0時まで何ミリ秒か計算してタイマーをセット
function scheduleMidnightReset() {
  const now  = new Date();
  const next = new Date(now);
  next.setHours(24, 0, 0, 0); // 翌日0時
  const ms = next - now;
  setTimeout(() => {
    checkDailyReset();
    renderTasks();
    scheduleMidnightReset(); // 次の日もセット
  }, ms);
}

// ==================== 起動 ====================
checkDailyReset();   // 起動時にリセットチェック
checkLogin();
renderPlayer();
renderItems();
renderBadges();
renderEvents();
renderTasks();
setInterval(renderEvents, 60000);
scheduleMidnightReset(); // 0時タイマーをセット
</script>
