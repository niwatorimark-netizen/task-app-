<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="クエストボード">
  <title>クエストボード</title>
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    :root { --grass:#5D9E32;--grass-dark:#3E7A1A;--stone-dark:#4A4A4A;--stone:#7A7A7A;--diamond:#4DDEDE;--gold:#FFD700;--iron:#C0C0C0;--redstone:#CC2200;--emerald:#00CC44;--bg:#2C2416;--panel:#3D3020;--panel2:#4A3A28;--border:#1A1208;--text:#FFE8B0;--text-dim:#AA9060; }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'DotGothic16','MS Gothic',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:110px;background-image:repeating-linear-gradient(0deg,rgba(0,0,0,.08) 0 1px,transparent 1px 32px),repeating-linear-gradient(90deg,rgba(0,0,0,.08) 0 1px,transparent 1px 32px);}
    header{background:var(--grass-dark);border-bottom:6px solid #2A5210;position:sticky;top:0;z-index:100;}
    .header-top{background:var(--grass);padding:12px 16px 8px;border-bottom:4px solid var(--grass-dark);}
    .header-row{display:flex;justify-content:space-between;align-items:center;gap:8px;}
    header h1{font-size:18px;color:#FFFF55;text-shadow:2px 2px 0 #555500;}
    .name-area{display:flex;align-items:center;gap:6px;}
    .player-name{font-size:14px;color:#FFFF55;text-shadow:1px 1px 0 #333300;background:rgba(0,0,0,.3);padding:3px 10px;border:2px solid rgba(255,255,85,.4);min-width:80px;cursor:pointer;}
    .player-name.placeholder{color:var(--text-dim);font-size:12px;}
    .name-edit-btn{background:var(--gold);color:#4A3000;border:2px solid var(--border);padding:3px 8px;font-size:11px;font-family:inherit;cursor:pointer;box-shadow:2px 2px 0 var(--border);}
    .date-bar{background:#1A1208;padding:6px 16px;display:flex;justify-content:space-between;align-items:center;}
    .date-display{font-size:15px;color:#FFFF55;text-shadow:1px 1px 0 #555500;letter-spacing:1px;}
    .xp-badge{background:var(--gold);color:#4A3000;padding:3px 10px;font-size:12px;font-weight:bold;}
    .xp-section{padding:6px 16px 4px;background:var(--grass-dark);}
    .xp-label{display:flex;justify-content:space-between;font-size:11px;color:#CCFF88;margin-bottom:3px;}
    .xp-bar{height:12px;background:#1A1208;border:2px solid var(--border);overflow:hidden;}
    .xp-fill{height:100%;background:linear-gradient(90deg,#55FF55,#00AA00);transition:width .5s;box-shadow:inset 0 2px 0 rgba(255,255,255,.3);}
    .hotbar-wrap{margin:8px 16px 4px;}
    .hotbar-label{font-size:11px;color:var(--text-dim);text-align:center;margin-bottom:4px;}
    .hotbar{background:var(--panel);padding:6px;display:flex;gap:3px;justify-content:center;border:3px solid var(--border);box-shadow:inset 2px 2px 0 rgba(255,255,255,.08),3px 3px 0 var(--border);}
    .hotbar-slot{width:38px;height:38px;background:var(--stone-dark);border:2px solid #222;display:flex;align-items:center;justify-content:center;font-size:20px;position:relative;}
    .hotbar-slot.filled{background:var(--panel2);}
    .hotbar-slot.filled::after{content:'';position:absolute;top:2px;left:2px;right:2px;height:3px;background:rgba(255,255,255,.25);}
    .hotbar-slot.empty{opacity:.3;}
    .quest-type-bar{display:flex;margin:8px 16px 4px;border:2px solid var(--border);box-shadow:3px 3px 0 var(--border);}
    .quest-type-btn{flex:1;padding:9px 4px;text-align:center;font-size:13px;background:var(--stone-dark);color:var(--text-dim);border:none;cursor:pointer;font-family:inherit;border-right:2px solid var(--border);}
    .quest-type-btn:last-child{border-right:none;}
    .quest-type-btn.active{background:var(--grass);color:#FFFF55;text-shadow:1px 1px 0 #333300;}
    .tabs{display:flex;gap:4px;padding:4px 16px;overflow-x:auto;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{flex-shrink:0;padding:6px 11px;font-size:11px;background:var(--stone-dark);color:var(--text-dim);cursor:pointer;border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);white-space:nowrap;}
    .tab.active{background:var(--grass);color:#FFFF55;text-shadow:1px 1px 0 #333300;}
    .task-list{padding:8px 16px;display:flex;flex-direction:column;gap:8px;}
    .task-card{background:var(--panel);border:3px solid var(--border);box-shadow:inset 2px 2px 0 rgba(255,255,255,.06),3px 3px 0 var(--border);padding:10px 12px;display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;transition:opacity .3s;}
    .task-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;}
    .task-card.done{opacity:.45;}
    .task-card.done .task-title{text-decoration:line-through;color:var(--text-dim);}
    .daily-badge{position:absolute;top:4px;right:48px;font-size:9px;background:#003366;color:#55AAFF;border:1px solid #55AAFF;padding:1px 5px;}
    .cat-icon{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:22px;background:var(--stone-dark);border:2px solid var(--border);flex-shrink:0;}
    .task-body{flex:1;min-width:0;}
    .task-title{font-size:14px;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .task-meta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
    .cat-tag{font-size:10px;color:var(--text-dim);background:var(--stone-dark);padding:2px 5px;border:1px solid var(--border);}
    .countdown{font-size:11px;padding:2px 7px;border:2px solid;font-weight:bold;}
    .countdown.overdue{background:#440000;border-color:var(--redstone);color:#FF5555;}
    .countdown.today{background:#443300;border-color:var(--gold);color:var(--gold);}
    .countdown.soon{background:#003300;border-color:var(--emerald);color:#55FF55;}
    .countdown.normal{background:var(--stone-dark);border-color:var(--stone);color:var(--text-dim);}
    .check-btn{width:36px;height:36px;background:var(--stone-dark);border:3px solid var(--border);box-shadow:inset 1px 1px 0 rgba(255,255,255,.15),2px 2px 0 var(--border);color:transparent;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .check-btn.done{background:var(--grass);color:#FFFF55;text-shadow:1px 1px 0 #333300;}
    .delete-btn{width:26px;height:26px;background:#440000;border:2px solid var(--border);color:#FF5555;font-size:11px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
    .empty-state{text-align:center;padding:36px 20px;color:var(--text-dim);}
    .empty-state .icon{font-size:48px;margin-bottom:10px;}
    .empty-state p{font-size:12px;line-height:2;}
    .fab{position:fixed;bottom:28px;right:20px;width:62px;height:62px;background:var(--grass);color:#FFFF55;font-size:30px;border:4px solid var(--border);box-shadow:inset 2px 2px 0 rgba(255,255,255,.3),inset -2px -2px 0 rgba(0,0,0,.4),4px 4px 0 var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:200;text-shadow:2px 2px 0 #333300;}
    .fab:active{transform:translate(3px,3px);box-shadow:inset 2px 2px 0 rgba(0,0,0,.3),1px 1px 0 var(--border);}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--panel);border:4px solid var(--border);border-bottom:none;padding:18px 18px 38px;width:100%;max-width:600px;transform:translateY(100%);transition:transform .3s ease;}
    .modal-overlay.open .modal{transform:translateY(0);}
    .modal-title{font-size:15px;color:#FFFF55;text-shadow:2px 2px 0 #333300;margin-bottom:14px;text-align:center;background:var(--grass-dark);padding:8px;border:2px solid var(--border);}
    .form-group{margin-bottom:12px;}
    .form-group label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;letter-spacing:1px;}
    .form-group input,.form-group select{width:100%;padding:10px 12px;background:var(--stone-dark);border:3px solid var(--border);box-shadow:inset 2px 2px 0 rgba(0,0,0,.4);font-size:15px;font-family:inherit;color:var(--text);outline:none;}
    .form-group input:focus,.form-group select:focus{border-color:var(--grass);}
    .form-group select option{background:var(--stone-dark);}
    .type-select{display:flex;gap:6px;}
    .type-opt{flex:1;padding:10px 4px;text-align:center;background:var(--stone-dark);border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);cursor:pointer;font-size:12px;color:var(--text-dim);font-family:inherit;}
    .type-opt.selected{background:var(--grass-dark);border-color:var(--grass);color:#FFFF55;text-shadow:1px 1px 0 #333300;}
    .type-opt .t-icon{font-size:22px;display:block;margin-bottom:4px;}
    .cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
    .cat-btn{padding:7px 3px;background:var(--stone-dark);border:2px solid var(--border);box-shadow:2px 2px 0 var(--border);cursor:pointer;text-align:center;font-size:10px;color:var(--text-dim);font-family:inherit;}
    .cat-btn .icon{font-size:18px;display:block;margin-bottom:3px;}
    .cat-btn.selected{background:var(--grass-dark);border-color:var(--grass);color:#FFFF55;text-shadow:1px 1px 0 #333300;}
    .btn-submit{width:100%;padding:13px;background:var(--grass);color:#FFFF55;font-size:14px;font-family:inherit;border:3px solid var(--border);box-shadow:inset 2px 2px 0 rgba(255,255,255,.25),3px 3px 0 var(--border);cursor:pointer;margin-top:6px;text-shadow:2px 2px 0 #333300;letter-spacing:1px;}
    .btn-submit:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--border);}
    .name-modal{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:600;opacity:0;pointer-events:none;transition:opacity .2s;}
    .name-modal.open{opacity:1;pointer-events:all;}
    .name-modal-box{background:var(--panel);border:4px solid var(--border);padding:24px 20px;width:88%;max-width:360px;text-align:center;box-shadow:6px 6px 0 var(--border);}
    .name-modal-box h3{color:#FFFF55;text-shadow:2px 2px 0 #555500;font-size:16px;margin-bottom:16px;}
    @keyframes levelUp{0%{transform:translate(-50%,-50%) scale(.5);opacity:0}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1}80%{transform:translate(-50%,-50%) scale(1);opacity:1}100%{transform:translate(-50%,-60%) scale(1);opacity:0}}
    .effect-text{position:fixed;top:50%;left:50%;z-index:999;pointer-events:none;font-size:26px;color:#FFFF55;text-shadow:3px 3px 0 #555500;animation:levelUp 1.2s ease forwards;white-space:nowrap;font-family:inherit;}
    @keyframes xpFloat{0%{transform:translateY(0);opacity:1}100%{transform:translateY(-60px);opacity:0}}
    .xp-float{position:fixed;z-index:998;pointer-events:none;font-size:15px;color:#55FF55;text-shadow:2px 2px 0 #003300;animation:xpFloat 1s ease forwards;font-family:inherit;}
    @keyframes blockBreak{0%{transform:scale(1);opacity:1}50%{transform:scale(1.3) rotate(15deg);opacity:.8}100%{transform:scale(0) rotate(45deg);opacity:0}}
    .block-break{position:fixed;z-index:997;pointer-events:none;font-size:22px;animation:blockBreak .5s ease forwards;}
    .cat-benkyou::before{background:var(--diamond)}.cat-sports::before{background:var(--emerald)}.cat-game::before{background:var(--redstone)}.cat-otetsudai::before{background:var(--gold)}.cat-shumi::before{background:#AA44FF}.cat-tomodachi::before{background:#FF88AA}.cat-challenge::before{background:#FF8800}.cat-other::before{background:var(--iron)}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="header-row">
      <h1>&#x26CF; クエストボード</h1>
      <div class="name-area">
        <div class="player-name" id="player-name-display" onclick="openNameModal()">名前を入力</div>
        <button class="name-edit-btn" onclick="openNameModal()">&#x270F;</button>
      </div>
    </div>
  </div>
  <div class="date-bar">
    <div class="date-display" id="today-label"></div>
    <div class="xp-badge" id="xp-badge">&#x2728; XP 0</div>
  </div>
  <div class="xp-section">
    <div class="xp-label"><span id="xp-level">Lv.1 見習い冒険者</span><span id="xp-pct">0%</span></div>
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>
</header>
<div class="hotbar-wrap">
  <div class="hotbar-label">&#x1F3C6; クリア数: <span id="total-done">0</span> ／ アイテム: <span id="hotbar-count">0</span>/10</div>
  <div class="hotbar" id="hotbar"></div>
</div>
<div class="quest-type-bar">
  <button class="quest-type-btn active" data-type="once">&#x2694; 1回クエスト</button>
  <button class="quest-type-btn" data-type="daily">&#x1F504; 毎日クエスト</button>
</div>
<div class="tabs" id="tabs">
  <div class="tab active" data-filter="all">すべて</div>
  <div class="tab" data-filter="benkyou">&#x1F4DA; 勉強</div>
  <div class="tab" data-filter="sports">&#x1F3C3; スポーツ</div>
  <div class="tab" data-filter="game">&#x1F3AE; ゲーム</div>
  <div class="tab" data-filter="otetsudai">&#x1F3E0; お手伝い</div>
  <div class="tab" data-filter="shumi">&#x1F3A8; 趣味</div>
  <div class="tab" data-filter="tomodachi">&#x1F46B; 友達</div>
  <div class="tab" data-filter="challenge">&#x1F525; チャレンジ</div>
  <div class="tab" data-filter="other">&#x1F4CC; その他</div>
</div>
<div class="task-list" id="task-list"></div>
<button class="fab" id="add-btn">&#xFF0B;</button>
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">&#x2692; 新しいクエストを追加</div>
    <div class="form-group"><label>&#x25BA; クエスト名</label><input type="text" id="task-input" placeholder="例：算数ドリル10ページ" maxlength="50"></div>
    <div class="form-group">
      <label>&#x25BA; クエスト種別</label>
      <div class="type-select">
        <button class="type-opt selected" data-qtype="once"><span class="t-icon">&#x2694;</span>1回クエスト</button>
        <button class="type-opt" data-qtype="daily"><span class="t-icon">&#x1F504;</span>毎日クエスト</button>
      </div>
    </div>
    <div class="form-group"><label>&#x25BA; カテゴリ</label><div class="cat-grid" id="cat-grid"></div></div>
    <div class="form-group" id="due-group"><label>&#x25BA; しめ切り日</label><input type="date" id="due-input"></div>
    <button class="btn-submit" id="submit-btn">&#x25BA; クエスト開始！</button>
  </div>
</div>
<div class="name-modal" id="name-modal">
  <div class="name-modal-box">
    <h3>&#x2694; プレイヤー名を入力</h3>
    <div class="form-group"><input type="text" id="name-input" placeholder="自分の名前を入れよう" maxlength="16" style="text-align:center;font-size:18px;"></div>
    <button class="btn-submit" id="name-save-btn">&#x25BA; 決定！</button>
  </div>
</div>
<script>
const CATEGORIES=[{id:'benkyou',name:'勉強',icon:'📚'},{id:'sports',name:'スポーツ',icon:'🏃'},{id:'game',name:'ゲーム目標',icon:'🎮'},{id:'otetsudai',name:'お手伝い',icon:'🏠'},{id:'shumi',name:'趣味・工作',icon:'🎨'},{id:'tomodachi',name:'友達・遊び',icon:'👫'},{id:'challenge',name:'チャレンジ',icon:'🔥'},{id:'other',name:'その他',icon:'📌'}];
const LEVELS=[{name:'見習い冒険者',xp:0},{name:'鉄の戦士',xp:100},{name:'金の勇者',xp:300},{name:'ダイヤ剣士',xp:600},{name:'エンダーの王',xp:1000},{name:'ドラゴンスレイヤー',xp:1500}];
const HOTBAR_ITEMS=['🗡️','🛡️','⛏','🏹','🧪','💎','🌟','🏆','👑','⚡'];
let tasks=JSON.parse(localStorage.getItem('mc_tasks')||'[]');
let xp=parseInt(localStorage.getItem('mc_xp')||'0');
let playerName=localStorage.getItem('mc_name')||'';
let currentFilter='all',currentType='once';
function save(){localStorage.setItem('mc_tasks',JSON.stringify(tasks));localStorage.setItem('mc_xp',xp);localStorage.setItem('mc_name',playerName);}
function today(){return new Date().toISOString().slice(0,10);}
function resetDailyIfNeeded(){const last=localStorage.getItem('mc_last_reset')||'';const t=today();if(last!==t){tasks.forEach(task=>{if(task.qtype==='daily')task.done=false;});localStorage.setItem('mc_last_reset',t);save();}}
function dueDiff(due){if(!due)return null;const d=new Date(due+'T00:00:00');const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000);}
function countdownLabel(due){const diff=dueDiff(due);if(diff===null)return null;if(diff<0)return{text:(-diff)+'日オーバー',cls:'overdue'};if(diff===0)return{text:'⚠ 今日まで！',cls:'today'};if(diff===1)return{text:'⏰ あと1日',cls:'soon'};if(diff<=3)return{text:'⏰ あと'+diff+'日',cls:'soon'};return{text:'📅 あと'+diff+'日',cls:'normal'};}
function getLevelInfo(v){let l=0;for(let i=LEVELS.length-1;i>=0;i--){if(v>=LEVELS[i].xp){l=i;break;}}const n=LEVELS[l+1],c=LEVELS[l];return{level:l+1,name:c.name,pct:n?Math.round((v-c.xp)/(n.xp-c.xp)*100):100};}
function catInfo(id){return CATEGORIES.find(c=>c.id===id)||CATEGORIES[7];}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderTasks(){const list=document.getElementById('task-list');let filtered=tasks.filter(t=>(t.qtype||'once')===currentType);if(currentFilter!=='all')filtered=filtered.filter(t=>t.cat===currentFilter);const sorted=[...filtered].sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;if(a.due&&b.due)return a.due.localeCompare(b.due);if(a.due)return -1;if(b.due)return 1;return b.id-a.id;});if(sorted.length===0){list.innerHTML='<div class="empty-state"><div class="icon">'+(currentType==='daily'?'🔄':'🗺️')+'</div><p>'+(currentType==='daily'?'まだ毎日クエストがないよ！<br>＋ボタンから追加しよう':'クエストがないよ！<br>＋ボタンから追加しよう')+'</p></div>';return;}list.innerHTML=sorted.map(task=>{const cat=catInfo(task.cat);const cd=countdownLabel(task.due);const isD=(task.qtype||'once')==='daily';return'<div class="task-card cat-'+task.cat+(task.done?' done':'')+'">'+( isD?'<div class="daily-badge">🔄 毎日</div>':'')+'<div class="cat-icon">'+cat.icon+'</div><div class="task-body"><div class="task-title">'+escHtml(task.title)+'</div><div class="task-meta"><span class="cat-tag">'+cat.name+'</span>'+(cd?'<span class="countdown '+cd.cls+'">'+cd.text+'</span>':'')+'</div></div><button class="check-btn'+(task.done?' done':'')+'" onclick="toggleTask('+task.id+')">'+(task.done?'✓':'')+'</button><button class="delete-btn" onclick="deleteTask('+task.id+')">✕</button></div>';}).join('');updateXpBar();}
function updateXpBar(){const done=tasks.filter(t=>t.done).length;document.getElementById('total-done').textContent=done;const info=getLevelInfo(xp);document.getElementById('xp-badge').textContent='✨ XP '+xp;document.getElementById('xp-level').textContent=(playerName?playerName+'  ':'')+' Lv.'+info.level+' '+info.name;document.getElementById('xp-pct').textContent=info.pct+'%';document.getElementById('xp-fill').style.width=info.pct+'%';}
function renderHotbar(){const h=document.getElementById('hotbar');const f=Math.min(Math.floor(xp/50)%10,10);document.getElementById('hotbar-count').textContent=f;h.innerHTML=Array.from({length:10},(_,i)=>'<div class="hotbar-slot '+(i<f?'filled':'empty')+'">'+HOTBAR_ITEMS[i]+'</div>').join('');}
function renderPlayerName(){const el=document.getElementById('player-name-display');if(playerName){el.textContent=playerName;el.classList.remove('placeholder');}else{el.textContent='名前を入力';el.classList.add('placeholder');}}
function toggleTask(id){const task=tasks.find(t=>t.id===id);if(!task)return;task.done=!task.done;if(task.done){xp+=30;showXpFloat(30);showBlockBreak();const info=getLevelInfo(xp);const prev=getLevelInfo(xp-30);if(info.level>prev.level)showEffect('⬆ LEVEL UP! Lv.'+info.level);else showEffect('✓ クエストクリア！');}else{xp=Math.max(0,xp-30);}save();renderTasks();renderHotbar();}
function deleteTask(id){if(!confirm('このクエストを消す？'))return;tasks=tasks.filter(t=>t.id!==id);save();renderTasks();}
function showEffect(t){const el=document.createElement('div');el.className='effect-text';el.textContent=t;document.body.appendChild(el);setTimeout(()=>el.remove(),1300);}
function showXpFloat(a){const el=document.createElement('div');el.className='xp-float';el.textContent='+'+a+' XP';el.style.left=(40+Math.random()*40)+'%';el.style.top='60%';document.body.appendChild(el);setTimeout(()=>el.remove(),1100);}
function showBlockBreak(){const b=['💎','⭐','🌟','🏆','🎯'];for(let i=0;i<5;i++){const el=document.createElement('div');el.className='block-break';el.textContent=b[Math.floor(Math.random()*b.length)];el.style.left=(30+Math.random()*40)+'%';el.style.top=(40+Math.random()*20)+'%';el.style.animationDelay=(i*.08)+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),700);}}
function openNameModal(){document.getElementById('name-input').value=playerName;document.getElementById('name-modal').classList.add('open');setTimeout(()=>document.getElementById('name-input').focus(),100);}
document.getElementById('name-save-btn').addEventListener('click',()=>{playerName=document.getElementById('name-input').value.trim();save();renderPlayerName();updateXpBar();document.getElementById('name-modal').classList.remove('open');});
document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('name-save-btn').click();});
document.getElementById('name-modal').addEventListener('click',e=>{if(e.target===document.getElementById('name-modal'))document.getElementById('name-modal').classList.remove('open');});
document.querySelector('.quest-type-bar').addEventListener('click',e=>{const btn=e.target.closest('.quest-type-btn');if(!btn)return;document.querySelectorAll('.quest-type-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentType=btn.dataset.type;renderTasks();});
document.getElementById('tabs').addEventListener('click',e=>{const tab=e.target.closest('.tab');if(!tab)return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));tab.classList.add('active');currentFilter=tab.dataset.filter;renderTasks();});
let selectedQtype='once';
document.querySelector('.type-select').addEventListener('click',e=>{const btn=e.target.closest('.type-opt');if(!btn)return;selectedQtype=btn.dataset.qtype;document.querySelectorAll('.type-opt').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');document.getElementById('due-group').style.display=selectedQtype==='daily'?'none':'';});
const catGrid=document.getElementById('cat-grid');
let selectedCat='other';
catGrid.innerHTML=CATEGORIES.map(c=>'<div class="cat-btn'+(c.id===selectedCat?' selected':'')+'" data-id="'+c.id+'"><span class="icon">'+c.icon+'</span>'+c.name+'</div>').join('');
catGrid.addEventListener('click',e=>{const btn=e.target.closest('.cat-btn');if(!btn)return;selectedCat=btn.dataset.id;catGrid.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');});
document.getElementById('add-btn').addEventListener('click',()=>{document.getElementById('modal').classList.add('open');document.getElementById('task-input').focus();document.getElementById('due-input').value=today();});
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');});
document.getElementById('submit-btn').addEventListener('click',()=>{const title=document.getElementById('task-input').value.trim();if(!title){document.getElementById('task-input').focus();return;}tasks.push({id:Date.now(),title,cat:selectedCat,qtype:selectedQtype,due:selectedQtype==='daily'?'':document.getElementById('due-input').value,done:false});save();renderTasks();renderHotbar();document.getElementById('task-input').value='';document.getElementById('modal').classList.remove('open');});
document.getElementById('task-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('submit-btn').click();});
const now=new Date(),days=['日','月','火','水','木','金','土'];
document.getElementById('today-label').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日（'+days[now.getDay()]+'）';
resetDailyIfNeeded();renderPlayerName();renderTasks();renderHotbar();updateXpBar();
</script>
</body>
  </html>
